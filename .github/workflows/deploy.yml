name: Деплой на VPS
run-name: 'Деплой: ${{ github.event.head_commit.message || format(''Ручной запуск ({0})'', github.actor) }}'

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Sanitize variables (remove whitespace)
          HOST=$(echo "$SSH_HOST" | xargs)
          USER=$(echo "$SSH_USER" | xargs)
          
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'dist' \
            --exclude '.env' \
            --exclude 'github_actions_key*' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${USER}@${HOST}:/var/www/justplanner/

      - name: Install Dependencies & Build
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
        run: |
          HOST=$(echo "$SSH_HOST" | xargs)
          USER=$(echo "$SSH_USER" | xargs)
          
          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} "
            cd /var/www/justplanner &&
            npm install &&
            npm run build
          "

      - name: Restart Backend
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
        run: |
          HOST=$(echo "$SSH_HOST" | xargs)
          USER=$(echo "$SSH_USER" | xargs)
          
          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} "
            cd /var/www/justplanner/server &&
            npm install &&
            pm2 restart justplanner-api
          "

      - name: Wait for server to start
        run: sleep 5

      - name: Run Smoke Tests
        id: smoke_tests
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
        run: |
          HOST=$(echo "$SSH_HOST" | xargs)
          USER=$(echo "$SSH_USER" | xargs)
          
          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} "
            cd /var/www/justplanner/server &&
            node tests/smoke-test.js
          "

      - name: Telegram — деплой успешен
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ <b>Деплой успешен</b>%0A%0A📝 ${{ github.event.head_commit.message }}%0A👤 ${{ github.actor }}%0A🕐 $(date '+%d.%m.%Y %H:%M' -d '+3 hours')"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML || true

      - name: Telegram — деплой упал
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🔴 <b>Деплой ПРОВАЛЕН</b>%0A%0A📝 ${{ github.event.head_commit.message }}%0A👤 ${{ github.actor }}%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML || true
