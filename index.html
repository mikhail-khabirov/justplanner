  <style>
    html, body {
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-thin::-webkit-scrollbar {
      height: 4px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 9999px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    .scrollbar-thin {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }

    /* Custom line height for the paper effect to match grid */
    .paper-grid {
      background-size: 100% 48px;
      /* 3rem */
    }

    /* Fix drag-and-drop in Yandex Browser and other Chromium variants */
    .task-item[draggable="true"] {
      -webkit-user-drag: element;
    }

    .task-ghost {
      opacity: 0.95;
      background: #ffffff;
      border: 2px solid #3b82f6;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transform: scale(1.05);
      border-radius: 0.5rem;
      pointer-events: none;
      /* Important for dragging */
      z-index: 9999;
    }

    /* Mobile: Increase task and hour block sizes by 30% */
    @media (max-width: 768px) {

      /* Hour blocks: increase min-height */
      .hour-block {
        min-height: 52px !important;
        /* ~40px * 1.3 */
      }

      /* Tasks: increase padding and font size */
      .task-item {
        padding: 0.5rem 0.65rem !important;
        /* ~30% larger */
        font-size: 0.85rem !important;
        /* ~11px -> 14px */
      }

      /* Paper grid: larger line spacing on mobile */
      .paper-grid {
        background-size: 100% 62px !important;
        /* 48px * 1.3 */
      }
    }

    /* Print styles: scale down for proper PDF fit */
    @media print {

      /* Scale down the entire page by ~35% */
      body {
        transform: scale(0.65);
        transform-origin: top left;
        width: 154%;
        /* 100% / 0.65 to compensate for scale */
      }

      /* Hide non-essential UI elements */
      header button,
      .no-print,
      [title="Настройки"],
      [title="Сохранить в PDF"],
      [title="Распечатать"],
      [title="Войти"] {
        display: none !important;
      }

      /* Hide modals and overlays */
      .fixed {
        display: none !important;
      }

      /* Ensure grid container is visible */
      #root {
        position: relative !important;
      }

      /* Remove shadows for cleaner print */
      * {
        box-shadow: none !important;
      }

      /* Ensure all columns print on one page */
      .overflow-x-auto {
        overflow: visible !important;
      }
    }
  </style>

      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
