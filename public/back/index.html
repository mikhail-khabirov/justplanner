<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustPlanner Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
        }
    </style>
</head>

<body class="min-h-screen">
    <div id="app"></div>

    <script>
        const API_URL = '/api/admin';
        let token = localStorage.getItem('admin_token');

        function render() {
            if (!token) {
                renderLogin();
            } else {
                renderDashboard();
            }
        }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex items-center justify-center px-4">
                    <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 w-full max-w-md border border-white/20">
                        <h1 class="text-2xl font-bold text-white text-center mb-6">🔐 Админ-панель</h1>
                        <form id="loginForm" class="space-y-4">
                            <div>
                                <input type="text" id="username" placeholder="Логин" 
                                    class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <input type="password" id="password" placeholder="Пароль" 
                                    class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <button type="submit" 
                                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition">
                                Войти
                            </button>
                            <p id="error" class="text-red-400 text-center hidden"></p>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const res = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        token = data.token;
                        localStorage.setItem('admin_token', token);
                        render();
                    } else {
                        document.getElementById('error').textContent = data.error;
                        document.getElementById('error').classList.remove('hidden');
                    }
                } catch (err) {
                    document.getElementById('error').textContent = 'Ошибка соединения';
                    document.getElementById('error').classList.remove('hidden');
                }
            });
        }

        let usersData = [];

        let sortConfig = { key: 'created_at', direction: 'desc' };

        async function renderDashboard() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen p-6">
                    <div class="max-w-[1600px] mx-auto">
                        <div class="flex justify-between items-center mb-8">
                            <h1 class="text-3xl font-bold text-white">📊 JustPlanner Admin</h1>
                            <button onclick="logout()" class="px-4 py-2 bg-red-600/80 hover:bg-red-600 text-white rounded-lg transition">
                                Выйти
                            </button>
                        </div>

                        <div id="stats" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                                <p class="text-white/60 text-sm">Всего пользователей</p>
                                <p id="totalUsers" class="text-3xl font-bold text-white">-</p>
                            </div>
                            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                                <p class="text-white/60 text-sm">Всего задач</p>
                                <div class="flex items-center gap-3">
                                    <p id="totalTasks" class="text-3xl font-bold text-white">-</p>
                                    <div id="tasksGrowth" class="hidden px-2 py-0.5 rounded bg-green-500/10 border border-green-500/20 text-green-300 text-xs font-medium">
                                        +<span id="tasks24h">0</span> за 24ч
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white/10 backdrop-blur-lg rounded-xl border border-white/20 overflow-hidden">
                            <div class="p-4 border-b border-white/20">
                                <h2 class="text-xl font-semibold text-white">👥 Пользователи</h2>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="bg-white/5">
                                        <tr>
                                            <th onclick="sort('id')" class="text-left px-3 py-2 text-white/60 text-xs font-medium cursor-pointer hover:text-white transition select-none group">
                                                <div class="flex items-center gap-1">ID <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('email')" class="text-left px-3 py-2 text-white/60 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Email <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('plan')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Подписка <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('registrationType')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Тип <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('source')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Источник <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('campaign')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Кампания <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('created_at')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Регистрация <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('lastSession')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Активность <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th onclick="sort('totalTasks')" class="px-3 py-2 text-left text-white/50 text-xs font-medium cursor-pointer hover:text-white transition select-none">
                                                <div class="flex items-center gap-1">Задачи <span class="text-xs opacity-50">↕</span></div>
                                            </th>
                                            <th class="px-3 py-2 text-left text-white/50 text-xs font-medium"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersTable">
                                        <tr><td colspan="9" class="p-4 text-white/50 text-center">Загрузка...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            loadStats();
            loadUsers();
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                const data = await res.json();
                document.getElementById('totalUsers').textContent = data.totalUsers;
                document.getElementById('totalTasks').textContent = data.totalTasks;

                if (data.tasks24h > 0) {
                    document.getElementById('tasks24h').textContent = data.tasks24h;
                    document.getElementById('tasksGrowth').classList.remove('hidden');
                } else {
                    document.getElementById('tasksGrowth').classList.add('hidden');
                }
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                const data = await res.json();
                usersData = data.users;

                // Sort with default config
                sort(sortConfig.key, sortConfig.direction);
            } catch (err) {
                console.error('Failed to load users:', err);
                document.getElementById('usersTable').innerHTML = '<tr><td colspan="9" class="p-4 text-white/50 text-center">Ошибка загрузки</td></tr>';
            }
        }

        function sort(key, forceDirection = null) {
            // Update config
            if (forceDirection) {
                sortConfig.key = key;
                sortConfig.direction = forceDirection;
            } else {
                if (sortConfig.key === key) {
                    sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    sortConfig.key = key;
                    sortConfig.direction = 'asc';
                }
            }

            // Perform sort
            usersData.sort((a, b) => {
                let valA = a[key];
                let valB = b[key];

                // Handle null/undefined
                if (valA === null || valA === undefined) valA = '';
                if (valB === null || valB === undefined) valB = '';

                // Handle numeric types
                if (typeof valA === 'number' && typeof valB === 'number') {
                    return sortConfig.direction === 'asc' ? valA - valB : valB - valA;
                }

                // Handle strings case-insensitive
                if (typeof valA === 'string' && typeof valB === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }

                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable();
            updateSortIndicators();
        }

        function updateSortIndicators() {
            // Reset all arrows to default state
            document.querySelectorAll('th span').forEach(span => {
                span.textContent = '↕';
                span.className = 'text-xs opacity-50';
            });

            // Find active header and update arrow
            const headers = document.querySelectorAll('th');
            // Make sure this matches the order of columns in the HTML
            const keyMap = ['id', 'email', 'plan', 'registrationType', 'source', 'campaign', 'created_at', 'lastSession', 'totalTasks', ''];

            const activeIndex = keyMap.indexOf(sortConfig.key);
            if (activeIndex !== -1 && headers[activeIndex]) {
                const span = headers[activeIndex].querySelector('span');
                if (span) {
                    span.textContent = sortConfig.direction === 'asc' ? '↑' : '↓';
                    span.className = 'text-xs text-blue-300 opacity-100 font-bold';
                }
            }
        }

        function renderTable() {
            const tbody = document.getElementById('usersTable');
            if (usersData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-white/50 text-center">Нет пользователей</td></tr>';
                return;
            }

            tbody.innerHTML = usersData.map(user => {
                const typeBadge = user.registrationType === 'Google'
                    ? '<span class="px-2 py-1 rounded bg-blue-500/20 text-blue-300 text-xs text-white">Google</span>'
                    : '<span class="px-2 py-1 rounded bg-white/10 text-white/70 text-xs">Email</span>';

                const lastLogin = user.lastSession
                    ? new Date(user.lastSession).toLocaleString('ru-RU')
                    : '<span class="text-white/30">-</span>';

                const source = user.source || 'direct/organic';
                const campaign = user.campaign || '-';

                return `
                <tr class="border-t border-white/10 hover:bg-white/5 transition-colors">
                    <td class="px-3 py-2 text-white/80 font-mono text-xs">${user.id}</td>
                    <td class="px-3 py-2 text-white font-medium text-sm">${user.email}</td>
                    <td class="px-3 py-2">
                        ${user.plan === 'pro'
                        ? '<span class="px-2 py-0.5 rounded bg-amber-500/20 text-amber-300 text-xs font-medium">Pro</span>'
                        : '<span class="px-2 py-0.5 rounded bg-white/10 text-white/50 text-xs">Free</span>'
                    }
                    </td>
                    <td class="px-3 py-2">${typeBadge}</td>
                    <td class="px-3 py-2 text-white/70 text-xs max-w-[120px] truncate" title="${source}">${source}</td>
                    <td class="px-3 py-2 text-white/70 text-xs max-w-[120px] truncate" title="${campaign}">${campaign}</td>
                    <td class="px-3 py-2 text-white/80 text-xs whitespace-nowrap">${new Date(user.created_at).toLocaleString('ru-RU')}</td>
                    <td class="px-3 py-2 text-white/80 text-xs whitespace-nowrap">${lastLogin}</td>
                    <td class="px-3 py-2 text-white/90 font-mono text-sm">
                        <div class="flex items-center gap-1">
                            <span class="font-bold">${user.totalTasks}</span>
                            ${user.tasks24h > 0
                        ? `<span class="px-1 py-0.5 rounded bg-green-500/10 border border-green-500/20 text-green-300 text-xs font-medium" title="Новые за 24ч">+${user.tasks24h}</span>`
                        : ''}
                        </div>
                    </td>
                    <td class="px-3 py-2">
                        <button onclick="deleteUser(${user.id}, '${user.email}')" class="p-1 text-white/40 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-colors" title="Удалить">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        async function deleteUser(id, email) {
            if (!confirm(`Вы действительно хотите удалить пользователя ${email}?\nЭто действие нельзя отменить.`)) {
                return;
            }

            try {
                const res = await fetch(`${API_URL}/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                if (res.ok) {
                    loadUsers(); // Reload table
                } else {
                    const errorData = await res.json();
                    alert(`Ошибка при удалении: ${errorData.error || res.statusText}`);
                }
            } catch (err) {
                console.error('Delete error:', err);
                alert('Ошибка соединения');
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('admin_token');
            render();
        }

        render();
    </script>
</body>

</html>
